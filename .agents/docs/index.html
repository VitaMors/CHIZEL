<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#101214">
  <title>CHIZEL</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-game-path="game/CHIZEL.html">
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>CHIZEL</span>
      </div>
      <a class="launch-link" href="game/CHIZEL.html">Open Fullscreen</a>
    </header>
    <iframe class="godot-frame" src="game/CHIZEL.html" title="CHIZEL Godot model creator"></iframe>
    <section class="missing-build">
      <h1>CHIZEL web build is not exported yet.</h1>
      <p>Export the Godot Web preset to <code>docs/game/CHIZEL.html</code>, or run the GitHub Actions Pages workflow.</p>
    </section>
  </main>
  <script>
    const gamePath = document.body.dataset.gamePath;
    fetch(gamePath, { method: "HEAD", cache: "no-store" })
      .then((response) => {
        if (response.ok) document.body.classList.add("has-build");
      })
      .catch(() => {});
  </script>
</body>
</html>
