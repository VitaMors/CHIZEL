name: Deploy CHIZEL to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  export-web:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.4.1
      GODOT_STATUS: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Download Godot
        run: |
          curl -L "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip" -o godot.zip
          unzip godot.zip
          mv "Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64" godot
          chmod +x godot

      - name: Install Godot web export templates
        run: |
          curl -L "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz" -o templates.tpz
          unzip templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          cp templates/web_nothreads_release.zip "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}/web_nothreads_release.zip"
          cp templates/web_nothreads_debug.zip "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}/web_nothreads_debug.zip"

      - name: Import Godot project
        run: ./godot --headless --import --quit

      - name: Export CHIZEL web build
        run: |
          mkdir -p docs/game
          ./godot --headless --export-release "Web" docs/game/CHIZEL.html
          test -f docs/game/CHIZEL.html
          test -f docs/game/CHIZEL.wasm
          test -f docs/game/CHIZEL.pck

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
